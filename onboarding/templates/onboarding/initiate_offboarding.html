{% extends "base.html" %} {% block content %}
<div class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card">
        <div class="card-header">
          <h5>Initiate Offboarding</h5>
          <p class="text-sm">For Employee ID: {{ view.kwargs.employee_id }}</p>
        </div>
        <div class="card-body">
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Exit Type</label>
              <select name="exit_type" class="form-control">
                <option value="RESIGNATION">Resignation</option>
                <option value="TERMINATION">Termination</option>
                <option value="RETIREMENT">Retirement</option>
              </select>
            </div>
            <div class="row">
              <div class="col-6 mb-3">
                <label class="form-label">Notice Date</label>
                <input
                  type="date"
                  name="notice_date"
                  class="form-control"
                  required
                />
              </div>
              <div class="col-6 mb-3">
                <label class="form-label">Last Working Day</label>
                <input
                  type="date"
                  name="exit_date"
                  class="form-control"
                  required
                />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Reason / Notes</label>
              <textarea name="reason" class="form-control" rows="3"></textarea>
            </div>

            <div class="text-center">
              <button type="submit" class="btn btn-warning w-100">
                Initiate Process
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
