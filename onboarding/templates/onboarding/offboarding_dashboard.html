{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-between mb-4">
                <h2>Offboarding & Exits</h2>
            </div>
            
            <div class="card">
                 <div class="card-header pb-0">
                    <h6>Exit Processes</h6>
                </div>
                <div class="card-body px-0 pt-0 pb-2">
                    <div class="table-responsive p-0">
                        <table class="table align-items-center mb-0">
                            <thead>
                                <tr>
                                    <th>Employee</th>
                                    <th>Exit Type</th>
                                    <th>Last Day</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for exit in exits %}
                                <tr>
                                    <td>
                                        <div class="d-flex px-2 py-1">
                                            <div class="d-flex flex-column justify-content-center">
                                                <h6 class="mb-0 text-sm">{{ exit.employee.full_name }}</h6>
                                            </div>
                                        </div>
                                    </td>
                                    <td>
                                        <span class="badge badge-sm bg-gradient-warning">{{ exit.get_exit_type_display }}</span>
                                    </td>
                                    <td>{{ exit.exit_date }}</td>
                                    <td>
                                        <a href="{% url 'onboarding:exit_interview' exit.pk %}" class="btn btn-sm btn-outline-dark">Conduct Interview</a>
                                    </td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
