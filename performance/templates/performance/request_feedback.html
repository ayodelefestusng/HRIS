{% extends "base.html" %} {% block content %}
<div class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card">
        <div class="card-header">
          <h5>Request Feedback</h5>
        </div>
        <div class="card-body">
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Reviewer</label>
              <select name="reviewer" class="form-control">
                {% for emp in view.request.user.tenant.employees.all %}
                <option value="{{ emp.pk }}">{{ emp.full_name }}</option>
                {% endfor %}
              </select>
              <small class="text-muted"
                >Select a peer, manager, or subordinate.</small
              >
            </div>

            <div class="mb-3">
              <label class="form-label">Message (Optional)</label>
              <textarea
                name="message"
                class="form-control"
                rows="3"
                placeholder="e.g. Please review my project management skills..."
              ></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Due Date</label>
              <input type="date" name="due_date" class="form-control" />
            </div>

            <div class="text-end">
              <button type="submit" class="btn btn-primary">
                Send Request
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
