{% extends "base.html" %} {% block content %}
<div class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-lg-10">
      <div class="card">
        <div class="card-header text-center">
          <h3>Self Appraisal: {{ object.period.name }}</h3>
          <p class="text-muted">Deadline: {{ object.period.end_date }}</p>
        </div>
        <div class="card-body">
          <form method="post">
            {% csrf_token %}
            <!-- Competencies Loop Stub -->
            <div class="mb-4">
              <h5>Core Competencies</h5>
              <div class="alert alert-light">
                <p>
                  Rate yourself on:
                  <strong>Teamwork, Leadership, Communication</strong>
                </p>
                <!-- This would normally loop through competencies linked to Job Role -->
              </div>
            </div>

            <div class="mb-4">
              <h5>Your Comments</h5>
              <label class="form-label">Achievements & Reflections</label>
              <textarea name="employee_comments" class="form-control" rows="8">
{{ object.employee_comments }}</textarea
              >
            </div>

            <div class="d-flex justify-content-between">
              <button
                type="submit"
                name="save"
                class="btn btn-outline-secondary"
              >
                Save Draft
              </button>
              <button
                type="submit"
                name="submit"
                class="btn btn-primary"
                onclick="return confirm('Submit active appraisal? This cannot be undone.');"
              >
                Submit to Manager
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
