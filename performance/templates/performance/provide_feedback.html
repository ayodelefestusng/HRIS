{% extends "base.html" %} {% block content %}
<div class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card">
        <div class="card-header">
          <h5>Provide Feedback for {{ object.requester.full_name }}</h5>
          <p class="text-sm text-secondary">"{{ object.message }}"</p>
        </div>
        <div class="card-body">
          <form method="post">
            {% csrf_token %}
            <div class="mb-4">
              <label class="form-label">Your Feedback</label>
              <textarea
                name="feedback_text"
                class="form-control"
                rows="10"
                placeholder="Be constructive and specific..."
              ></textarea>
            </div>

            <div class="text-end">
              <button type="submit" class="btn btn-primary">
                Submit Feedback
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
