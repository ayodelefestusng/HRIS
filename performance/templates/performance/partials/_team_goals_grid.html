<div class="row g-4 animate-fade-in">
    {% for employee in team %}
    <div class="col-md-4">
        <div class="admin-card p-4">
            <div class="d-flex align-items-center mb-3">
                <img src="{{ employee.avatar.url }}" class="rounded-circle me-3" width="40" height="40">
                <div>
                    <h6 class="fw-bold mb-0 text-white">{{ employee.full_name }}</h6>
                    <span class="x-small text-slate-500">{{ employee.job_title }}</span>
                </div>
            </div>
            
            <label class="text-slate-400 x-small uppercase fw-bold mb-2 d-block">Goal Progress</label>
            {% for goal in employee.goals.all %}
            <div class="mb-3">
                <div class="d-flex justify-content-between x-small mb-1">
                    <span class="text-slate-300">{{ goal.title }}</span>
                    <span class="text-primary fw-bold">{{ goal.progress }}%</span>
                </div>
                <div class="progress bg-slate-700" style="height: 4px;">
                    <div class="progress-bar bg-primary" style="width: {{ goal.progress }}%"></div>
                </div>
            </div>
            {% endfor %}
            
            <button class="btn btn-xs btn-outline-slate-600 w-100 mt-2 text-slate-300" 
                    hx-get="{% url 'create_review' employee.id %}" 
                    hx-target="#modal-content" 
                    data-bs-toggle="modal" data-bs-target="#modal-container">
                Initiate Appraisal
            </button>
        </div>
    </div>
    {% endfor %}
</div>
