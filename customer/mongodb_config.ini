# MongoDB & Database Configuration
# ==================================
# Configuration for MongoDB integration with HR/Customer Service Chatbot

[mongodb]
# MongoDB Connection Settings
host = localhost
port = 27017
database = hr_chatbot_db
username = 
password = 

# Connection pool settings
max_pool_size = 50
min_pool_size = 10
max_idle_time_ms = 60000

[mongodb_collections]
# Collections for different services

# Customer Service Collections
customers = customers
customer_issues = customer_service_issues
customer_tickets = customer_support_tickets
customer_interactions = customer_interactions

# HR Employee Collections
employees = employees
leave_requests = leave_requests
payroll_records = payroll_records
benefits_enrollments = benefits_enrollments
hr_complaints = hr_complaints
training_programs = training_programs

# CRM Collections
accounts = crm_accounts
contacts = crm_contacts
leads = crm_leads
opportunities = crm_opportunities
activities = crm_activities

# Analytics Collections
customer_analytics = customer_analytics
sales_analytics = sales_analytics
hr_analytics = hr_analytics
transaction_analytics = transaction_analytics

[indexes]
# Index configurations for performance

# Customer Service Indexes
customers: [customer_id, tenant_id]
customer_issues: [tenant_id, customer_id, status, created_at]
customer_tickets: [tenant_id, ticket_id, priority, created_at]

# HR Indexes
employees: [employee_id, tenant_id]
leave_requests: [tenant_id, employee_id, status, start_date]
payroll_records: [tenant_id, employee_id, period]

# CRM Indexes
accounts: [tenant_id, account_id, name]
leads: [tenant_id, status, created_at]
opportunities: [tenant_id, stage, expected_close_date]

# Analytics Indexes
customer_analytics: [tenant_id, date]
transaction_analytics: [tenant_id, customer_id, transaction_date]

[data_models]
# Data structure mappings

# Customer Service Model
customer_issue = {
    "_id": ObjectId,
    "tenant_id": str,
    "customer_id": str,
    "issue_type": str,  # complaint, inquiry, transaction, account
    "priority": str,    # low, normal, high, critical
    "status": str,      # open, in_progress, resolved, closed
    "description": str,
    "created_at": datetime,
    "updated_at": datetime,
    "resolved_at": datetime (optional),
    "assigned_to": str,
    "resolution_notes": str,
    "satisfaction_rating": float,
    "attachment_url": str (optional)
}

# HR Leave Request Model
leave_request = {
    "_id": ObjectId,
    "tenant_id": str,
    "employee_id": str,
    "leave_type": str,  # annual, sick, personal, unpaid
    "start_date": date,
    "end_date": date,
    "duration_days": int,
    "reason": str,
    "status": str,  # pending, approved, rejected
    "requested_at": datetime,
    "reviewed_by": str (optional),
    "reviewed_at": datetime (optional),
    "comments": str (optional)
}

# CRM Lead Model
crm_lead = {
    "_id": ObjectId,
    "tenant_id": str,
    "lead_id": str,
    "first_name": str,
    "last_name": str,
    "email": str,
    "phone": str,
    "company": str,
    "job_title": str,
    "industry": str,
    "status": str,  # new, contacted, qualified, unqualified, converted
    "lead_source": str,  # web, referral, partner, event
    "assigned_to": str,
    "created_at": datetime,
    "last_contacted": datetime,
    "notes": [str],
    "custom_fields": {}
}

# Transaction Analytics Model
transaction_record = {
    "_id": ObjectId,
    "tenant_id": str,
    "customer_id": str,
    "transaction_id": str,
    "transaction_type": str,  # deposit, withdrawal, transfer
    "amount": float,
    "currency": str,
    "channel": str,  # ATM, POS, Branch, Web, Mobile
    "timestamp": datetime,
    "status": str,  # completed, pending, failed
    "branch_id": str,
    "time_of_day": str  # morning, afternoon, evening
}

[security]
# Data protection and encryption

# Field-level encryption for sensitive data
encrypt_fields = [
    "employees.ssn",
    "customers.account_number",
    "customer_service_issues.customer_contact_info",
    "payroll_records.salary_amount"
]

# Access control settings
rbac_enabled = true
audit_logging = true

# Data retention policies
customer_data_retention_days = 2555  # ~7 years
transaction_data_retention_days = 2555
employee_data_retention_days = 3650  # 10 years (for compliance)
