<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        .btn { display: inline-block; width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; box-sizing: border-box; }
        .btn:hover { background-color: #0056b3; }
        .error { color: red; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Reset Password</h2>
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
    <p>Click the button below to receive a One-Time Password (OTP) via SMS to securely reset your password.</p>
    
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn">Send OTP via SMS</button>
    </form>
</div>

</body>
</html>
