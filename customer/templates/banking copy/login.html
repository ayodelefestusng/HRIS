<!DOCTYPE html>
<html>
<head>
    <title>Secure Banking Login</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; }
        input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        .error { color: red; font-size: 14px; margin-bottom: 10px; text-align: center; }
        .forgot { text-align: center; margin-top: 15px; }
        .forgot a { color: #007bff; text-decoration: none; }
        .forgot a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Secure Login</h2>

    <!-- Account verification banner -->
    <div class="verification-banner">
      <div class="verify-icon">🛡️</div>
      <div class="verify-text">
        <div class="verify-label">Account Verified</div>
        <div class="verify-name">{{ full_name }}</div>
        <div class="verify-account">
          Account Number: <strong>{{ account_number }}</strong>
        </div>
      </div>
    </div>
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="password">Enter your 4-digit PIN or Password</label>
            <input type="password" name="password" id="password" required>
        </div>
        <button type="submit">Login</button>
    </form>
    <div class="forgot">
        <a href="/banking/forgot-password/?phone={{ phone }}&intent={{ intent }}">Forgot Password?</a>
    </div>
</div>

</body>
</html>
