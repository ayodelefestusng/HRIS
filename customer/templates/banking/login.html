<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>Secure Login | VectraPay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0B1622; --surface:#132030; --surface-2:#1A2D42;
      --border:rgba(255,255,255,0.08); --border-hover:rgba(255,255,255,0.16);
      --brand:#0EA560; --brand-dim:#0B8A50; --brand-glow:rgba(14,165,96,0.25);
      --gold:#F5B731; --danger:#F05252; --danger-dim:rgba(240,82,82,0.12);
      --text:#F0F6FF; --text-muted:#7A92AB; --text-soft:#B8CCDB;
    }
    html { font-size: 16px; -webkit-text-size-adjust:100%; }
    body {
      min-height: 100vh;
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 16px;
      position: relative; overflow-x: hidden;
    }
    /* Ambient orbs */
    body::before, body::after {
      content:''; position:fixed; border-radius:50%;
      pointer-events:none; z-index:0;
    }
    body::before {
      width:480px; height:480px;
      background: radial-gradient(circle, rgba(14,165,96,0.12) 0%, transparent 70%);
      top:-120px; right:-120px;
    }
    body::after {
      width:360px; height:360px;
      background: radial-gradient(circle, rgba(245,183,49,0.07) 0%, transparent 70%);
      bottom:-80px; left:-80px;
    }

    /* Logo */
    .logo {
      display:flex; align-items:center; gap:10px;
      margin-bottom:32px; position:relative; z-index:1;
    }
    .logo-mark {
      width:40px; height:40px;
      background: linear-gradient(135deg, var(--brand), #06C97A);
      border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      box-shadow: 0 0 20px var(--brand-glow);
    }
    .logo-mark svg { width:20px; height:20px; color:#fff; }
    .logo-name {
      font-family:'Syne', sans-serif;
      font-size:22px; font-weight:800; color:var(--text);
      letter-spacing:-0.3px;
    }
    .logo-name span { color:var(--brand); }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius:24px;
      width:100%; max-width:420px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      overflow:hidden;
      position:relative; z-index:1;
      animation: slideUp .5s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* Verified banner */
    .verified-banner {
      background: linear-gradient(135deg, rgba(14,165,96,0.15), rgba(14,165,96,0.06));
      border-bottom: 1px solid rgba(14,165,96,0.2);
      padding: 20px 28px;
      display:flex; align-items:center; gap:14px;
    }
    .shield-icon {
      width:44px; height:44px; flex-shrink:0;
      background: rgba(14,165,96,0.15);
      border: 1.5px solid rgba(14,165,96,0.3);
      border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      font-size:20px;
    }
    .banner-info {}
    .banner-label {
      font-size:10px; font-weight:700; letter-spacing:1.2px;
      text-transform:uppercase; color:var(--brand);
      margin-bottom:3px;
    }
    .banner-name {
      font-size:15px; font-weight:700; color:var(--text);
      margin-bottom:2px;
    }
    .banner-account {
      font-size:12px; color:var(--text-muted);
    }
    .banner-account strong {
      font-family:'Courier New', monospace;
      color:var(--text-soft); font-size:13px;
    }

    /* Body */
    .card-body { padding:28px; }

    .card-title {
      font-family:'Syne', sans-serif;
      font-size:22px; font-weight:700; color:var(--text);
      margin-bottom:6px;
    }
    .card-subtitle {
      font-size:14px; color:var(--text-muted); margin-bottom:24px;
    }

    /* Error */
    .alert-error {
      background: var(--danger-dim);
      border: 1px solid rgba(240,82,82,0.25);
      border-radius:10px;
      padding:12px 14px;
      font-size:14px; color:#FCA5A5;
      display:flex; gap:8px; align-items:flex-start;
      margin-bottom:20px;
      animation: shake .35s ease;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
    }

    /* Form */
    .form-group { margin-bottom:20px; }
    label {
      display:block; font-size:13px; font-weight:600;
      color:var(--text-soft); margin-bottom:8px; letter-spacing:0.2px;
    }
    .input-wrap { position:relative; }
    input[type="password"], input[type="text"] {
      width:100%;
      padding: 15px 52px 15px 16px;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid var(--border);
      border-radius:12px;
      font-family:'Outfit',sans-serif;
      font-size:16px; color:var(--text);
      letter-spacing:2px;
      outline:none;
      transition: border-color .2s, box-shadow .2s, background .2s;
      -webkit-appearance:none;
    }
    input::placeholder { letter-spacing:0; color:var(--text-muted); font-size:15px; }
    input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px var(--brand-glow);
      background: rgba(14,165,96,0.04);
    }
    .eye-btn {
      position:absolute; right:14px; top:50%;
      transform:translateY(-50%);
      background:none; border:none; cursor:pointer;
      color:var(--text-muted); font-size:18px;
      padding:4px; line-height:1;
      transition:color .2s;
    }
    .eye-btn:hover { color:var(--text); }

    /* Submit */
    .btn-primary {
      width:100%; padding:16px;
      background: linear-gradient(135deg, var(--brand), #07C97A);
      color:#fff; border:none; border-radius:14px;
      font-family:'Outfit',sans-serif;
      font-size:16px; font-weight:700;
      cursor:pointer; letter-spacing:0.2px;
      box-shadow: 0 6px 24px var(--brand-glow);
      transition: opacity .2s, transform .15s, box-shadow .2s;
      display:flex; align-items:center; justify-content:center; gap:8px;
      -webkit-appearance:none;
    }
    .btn-primary:hover { opacity:.9; box-shadow: 0 8px 32px var(--brand-glow); }
    .btn-primary:active { transform:scale(.98); }

    /* Forgot */
    .forgot-link {
      text-align:center; margin-top:20px;
    }
    .forgot-link a {
      font-size:14px; color:var(--text-muted);
      text-decoration:none;
      transition:color .2s;
    }
    .forgot-link a:hover { color:var(--brand); }

    /* Footer */
    .card-footer {
      padding:16px 28px 20px;
      border-top:1px solid var(--border);
      display:flex; justify-content:center; gap:20px; flex-wrap:wrap;
    }
    .badge {
      font-size:11px; color:var(--text-muted);
      display:flex; align-items:center; gap:5px;
    }
    .badge-dot {
      width:6px; height:6px; border-radius:50%;
      background:var(--brand); opacity:.7;
    }
  </style>
</head>
<body>

  <div class="logo">
    <div class="logo-mark">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
    </div>
    <span class="logo-name">Vectra<span>Pay</span></span>
  </div>

  <div class="card">
    <!-- Verified Banner -->
    <div class="verified-banner">
      <div class="shield-icon">🛡️</div>
      <div class="banner-info">
        <div class="banner-label">Account Verified</div>
        <div class="banner-name">{{ full_name }}</div>
        <div class="banner-account">Account: <strong>{{ account_number }}</strong></div>
      </div>
    </div>

    <div class="card-body">
      <h1 class="card-title">Welcome back</h1>
      <p class="card-subtitle">Enter your PIN or password to continue</p>

      {% if error %}
      <div class="alert-error">
        <span>⚠️</span><span>{{ error }}</span>
      </div>
      {% endif %}

      <form method="POST" id="loginForm">
        {% csrf_token %}
        <div class="form-group">
          <label for="password">PIN / Password</label>
          <div class="input-wrap">
            <input type="password" name="password" id="password"
                   placeholder="Enter your PIN or password" required autocomplete="current-password"/>
            <button type="button" class="eye-btn" onclick="toggleVis('password',this)" tabindex="-1">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn-primary">
          <span>🔐</span><span>Login Securely</span>
        </button>
      </form>

      <div class="forgot-link">
        <a href="/banking/forgot-password/?phone={{ phone }}&intent={{ intent }}">Forgot password?</a>
      </div>
    </div>

    <div class="card-footer">
      <span class="badge"><span class="badge-dot"></span>256-bit SSL</span>
      <span class="badge"><span class="badge-dot"></span>NDPR Compliant</span>
      <span class="badge"><span class="badge-dot"></span>CBN Licensed</span>
    </div>
  </div>

<script>
  function toggleVis(id, btn) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
    btn.textContent = el.type === 'password' ? '👁️' : '🙈';
  }
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    const btn = this.querySelector('.btn-primary');
    btn.innerHTML = '<span>⏳</span><span>Verifying…</span>';
    btn.style.opacity = '0.7';
    btn.style.pointerEvents = 'none';
  });
</script>
</body>
</html>
