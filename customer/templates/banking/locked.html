<!DOCTYPE html>
<html>
<head>
    <title>Account Locked</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #ffe6e6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .locked-box { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #d9534f; }
        p { color: #555; font-size: 16px; margin-bottom: 20px; }
        .btn { display: inline-block; width: 100%; padding: 10px; background-color: #d9534f; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; text-decoration: none; box-sizing: border-box; }
        .btn:hover { background-color: #c9302c; }
    </style>
</head>
<body>

<div class="locked-box">
    <h2>Account Locked</h2>
    <p>Your account has been locked due to too many failed login attempts.</p>
    <p>To secure your account, please click below to reset your password. An OTP will be sent to your registered phone number.</p>
    
    <form action="/customer/banking/forgot-password/?phone={{ phone }}&intent={{ intent }}" method="POST">
        {% csrf_token %}
        <button type="submit" class="btn">Reset Password / Send OTP</button>
    </form>
</div>

</body>
</html>
