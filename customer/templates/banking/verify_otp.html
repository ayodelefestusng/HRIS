<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #666; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 18px; text-align: center; letter-spacing: 5px; }
        .btn { display: inline-block; width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; box-sizing: border-box; }
        .btn:hover { background-color: #218838; }
        .resend { margin-top: 15px; font-size: 14px; }
        .resend button { background: none; border: none; color: #007bff; text-decoration: underline; cursor: pointer; }
        .error { color: red; font-size: 14px; margin-bottom: 10px; }
        .countdown { color: #d9534f; font-weight: bold; }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var timeLeft = 300; // 5 minutes
            var countdownElem = document.getElementById("countdown");
            var resendBtn = document.getElementById("resend-btn");
            var timer = setInterval(function() {
                timeLeft--;
                var m = Math.floor(timeLeft / 60);
                var s = timeLeft % 60;
                countdownElem.textContent = m + ":" + (s < 10 ? "0" : "") + s;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    countdownElem.textContent = "Expired";
                    resendBtn.style.display = "inline";
                }
            }, 1000);
        });
    </script>
</head>
<body>

<div class="box">
    <h2>Verify OTP</h2>
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
    <p>An OTP has been sent to your registered phone number. It will expire in <span id="countdown" class="countdown">5:00</span>.</p>
    
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="otp">Enter 6-digit OTP</label>
            <input type="text" name="otp" id="otp" maxlength="6" required pattern="\d{6}">
        </div>
        <button type="submit" class="btn">Verify</button>
    </form>
    
    <div class="resend" id="resend-btn" style="display: none;">
        <form action="/banking/forgot-password/?phone={{ phone }}&intent={{ intent }}" method="POST">
            {% csrf_token %}
            <span>Did not receive the OTP?</span> <button type="submit">Resend</button>
        </form>
    </div>
</div>

</body>
</html>
