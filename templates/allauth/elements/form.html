{% load allauth %}
<form method="{{ attrs.method }}" action="{{ attrs.action }}">
    {% csrf_token %}
    {% if form.non_field_errors %}
        <div class="alert alert-danger">
            {{ form.non_field_errors }}
        </div>
    {% endif %}
    {% slot body %}
    {% endslot %}
    <hr>

    {% slot actions %}
    {% endslot %}
</form>
