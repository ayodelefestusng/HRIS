{% extends "base.html" %} {% block content %}
<div class="container-fluid py-4">
  <div class="row">
    <div class="col-12">
      <h2>Employee Benefits</h2>
      <div class="row mt-4">
        {% for benefit in benefits %}
        <div class="col-md-6 col-lg-4 mb-4">
          <div class="card">
            <div class="card-header bg-gradient-primary p-3">
              <h6 class="text-white mb-0">{{ benefit.name }}</h6>
            </div>
            <div class="card-body">
              <p class="text-sm font-weight-bold">
                Cost: ${{ benefit.cost_to_employee }}/mo
              </p>
              <p class="text-xs">{{ benefit.description }}</p>

              <hr class="horizontal dark" />
              <div class="text-end">
                <button
                  class="btn btn-primary btn-sm mb-0"
                  hx-post="{% url 'employees:enroll_benefit' benefit.pk %}"
                  hx-swap="outerHTML"
                >
                  Enroll Now
                </button>
              </div>
            </div>
          </div>
        </div>
        {% empty %}
        <div class="col-12">
          <p>No benefits available for enrollment at this time.</p>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
