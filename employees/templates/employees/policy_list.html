{% extends "base.html" %} {% block content %}
<div class="container-fluid py-4">
  <div class="row">
    <div class="col-12">
      <h2>Company Policies</h2>
      <div class="row mt-4">
        {% for policy in policies %}
        <div class="col-lg-4 mb-4">
          <div class="card h-100">
            <div class="card-body">
              <h5 class="card-title">{{ policy.title }}</h5>
              <p class="card-text text-sm text-secondary">
                {{ policy.description|truncatewords:20 }}
              </p>

              <div
                class="d-flex justify-content-between align-items-center mt-3"
              >
                <a
                  href="{{ policy.document.url }}"
                  target="_blank"
                  class="btn btn-sm btn-outline-info mb-0"
                  >Read Policy</a
                >

                <!-- HTMX Acknowledge -->
                <button
                  class="btn btn-sm btn-success mb-0"
                  hx-post="{% url 'employees:acknowledge_policy' policy.pk %}"
                  hx-swap="outerHTML"
                >
                  Acknowledge
                </button>
              </div>
            </div>
            <div class="card-footer py-2">
              <small class="text-muted"
                >Last Updated: {{ policy.updated_at|date:"M Y" }}</small
              >
            </div>
          </div>
        </div>
        {% empty %}
        <div class="col-12"><p>No active policies published.</p></div>
        {% endfor %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
