{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-lg-6 col-md-8 mx-auto">
            <div class="card z-index-0">
                <div class="card-header text-center pt-4">
                    <h5>Update Schedule</h5>
                </div>
                <div class="card-body">
                    <form role="form" method="post">
                        {% csrf_token %}
                        <!-- Simple form rendering using Bootstrap classes manually or via crispy if installed -->
                        <div class="mb-3">
                            <label>Name</label>
                            <input type="text" name="name" class="form-control" value="{{ object.name }}" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label>Start Date</label>
                                <input type="date" name="start_date" class="form-control" value="{{ object.start_date|date:'Y-m-d' }}" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label>End Date</label>
                                <input type="date" name="end_date" class="form-control" value="{{ object.end_date|date:'Y-m-d' }}" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label>Status</label>
                            <select name="status" class="form-control">
                                {% for code, label in object.STATUS_CHOICES %}
                                    <option value="{{ code }}" {% if object.status == code %}selected{% endif %}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="text-center">
                            <button type="submit" class="btn bg-gradient-dark w-100 my-4 mb-2">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
