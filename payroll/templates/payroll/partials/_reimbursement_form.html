<div class="card border-0 shadow-sm animate-fade-in" id="expense-form-container">
    <div class="card-body p-4">
        <h6 class="fw-bold mb-3"><i class="bi bi-receipt me-2 text-primary"></i>New Expense Claim</h6>
        
        <form hx-post="{% url 'submit_expense' %}" 
              hx-encoding="multipart/form-data" 
              hx-target="#expense-list"
              hx-swap="afterbegin"
              hx-on::after-request="this.reset()">
            
            <div class="mb-3">
                <label class="form-label small text-muted">What was this for?</label>
                <input type="text" name="description" class="form-control" placeholder="e.g. Client Lunch or Internet" required>
            </div>

            <div class="row g-2 mb-3">
                <div class="col-7">
                    <label class="form-label small text-muted">Amount</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">{{ request.tenant.currency_symbol }}</span>
                        <input type="number" name="amount" class="form-control" placeholder="0.00" step="0.01" required>
                    </div>
                </div>
                <div class="col-5">
                    <label class="form-label small text-muted">Receipt</label>
                    <input type="file" name="receipt" class="form-control form-control-sm" accept="image/*,application/pdf">
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 rounded-pill">
                <span class="htmx-indicator spinner-border spinner-border-sm me-2"></span>
                Submit Claim
            </button>
        </form>
    </div>
</div>
