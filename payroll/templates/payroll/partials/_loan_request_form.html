<div class="card border-0 shadow-sm animate-fade-in" id="loan-request-container">
    <div class="card-body p-4">
        <h6 class="fw-bold mb-3"><i class="bi bi-cash-stack me-2 text-success"></i>Request Cash Advance</h6>
        
        <form hx-post="{% url 'submit_loan_request' %}" hx-target="#loan-request-container">
            <div class="mb-3">
                <label class="form-label small text-muted">Amount Requested (Max: {{ max_eligible }})</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0">{{ request.tenant.currency_symbol }}</span>
                    <input type="number" name="amount" class="form-control border-start-0" 
                           placeholder="0.00" required
                           hx-get="{% url 'calculate_loan_preview' %}" 
                           hx-trigger="keyup changed delay:500ms" 
                           hx-target="#loan-preview">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label small text-muted">Repayment Duration (Months)</label>
                <select name="months" class="form-select" hx-get="{% url 'calculate_loan_preview' %}" hx-target="#loan-preview">
                    <option value="1">1 Month</option>
                    <option value="3">3 Months</option>
                    <option value="6">6 Months</option>
                </select>
            </div>

            <div id="loan-preview" class="p-3 bg-light rounded-3 mb-3 small text-muted">
                Enter an amount to see repayment estimates.
            </div>

            <div class="mb-3">
                <label class="form-label small text-muted">Purpose of Request</label>
                <textarea name="reason" class="form-control" rows="2" placeholder="Briefly explain the urgency..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100 rounded-pill">
                Submit Request for Approval
            </button>
        </form>
    </div>
</div>
