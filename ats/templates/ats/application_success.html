<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Submitted</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full bg-white p-8 rounded-lg shadow-lg text-center">
        <div class="mb-4 flex justify-center">
            <div class="bg-green-100 p-3 rounded-full">
                <svg class="h-12 w-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
        </div>
        
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Application Received!</h2>
        <p class="text-gray-600 mb-6">
            Thank you for applying. Our team will review your profile and get back to you if your skills match our requirements.
        </p>

        <div class="border-t border-gray-100 pt-6">
            <p class="text-sm text-gray-500 mb-4">You can now close this window or return to our job board.</p>
            <a href="/" class="inline-block bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 transition duration-200">
                Back to Careers
            </a>
        </div>
    </div>
</body>
</html>
