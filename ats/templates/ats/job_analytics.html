{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-12">
            <div class="card mb-4">
                <div class="card-header pb-0">
                    <h6>Recruitment Analytics</h6>
                </div>
                <div class="card-body px-0 pt-0 pb-2">
                    <div class="row p-4">
                        <div class="col-lg-6 mb-4">
                            <div class="card h-100">
                                <div class="card-header pb-0">
                                    <h6>Applications Over Time</h6>
                                </div>
                                <div class="card-body p-3">
                                    <canvas id="applicationsChart" height="300"></canvas>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-6 mb-4">
                            <div class="card h-100">
                                <div class="card-header pb-0">
                                    <h6>Funnel Conversion</h6>
                                </div>
                                <div class="card-body p-3">
                                    <canvas id="funnelChart" height="300"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row p-4">
                         <div class="col-lg-12">
                            <div class="card h-100">
                                <div class="card-header pb-0">
                                    <h6>Key Metrics</h6>
                                </div>
                                <div class="card-body p-3">
                                    <div class="table-responsive">
                                        <table class="table align-items-center mb-0">
                                            <thead>
                                                <tr>
                                                    <th class="text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Metric</th>
                                                    <th class="text-uppercase text-secondary text-xxs font-weight-bolder opacity-7 ps-2">Value</th>
                                                    <th class="text-uppercase text-secondary text-xxs font-weight-bolder opacity-7 ps-2">Change</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <!-- Dynamic content will go here -->
                                                <tr>
                                                    <td><div class="d-flex px-2 py-1"><div class="d-flex flex-column justify-content-center"><h6 class="mb-0 text-sm">Time to Hire</h6></div></div></td>
                                                    <td><p class="text-xs font-weight-bold mb-0">24 Days</p></td>
                                                    <td><span class="badge badge-sm bg-gradient-success">+12%</span></td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // Dynamic Data from Backend
    const ctxApp = document.getElementById('applicationsChart').getContext('2d');
    const applicationsChart = new Chart(ctxApp, {
        type: 'line',
        data: {
            labels: {{ chart_apps_labels|safe }},
            datasets: [{
                label: 'New Applications',
                data: {{ chart_apps_data|safe }},
                borderColor: '#cb0c9f',
                tension: 0.4,
                fill: true,
                backgroundColor: 'rgba(203, 12, 159, 0.1)'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: { beginAtZero: true }
            }
        }
    });

    const ctxFunnel = document.getElementById('funnelChart').getContext('2d');
    const funnelChart = new Chart(ctxFunnel, {
        type: 'bar',
        data: {
            labels: {{ chart_funnel_labels|safe }},
            datasets: [{
                label: 'Candidates',
                data: {{ chart_funnel_data|safe }},
                backgroundColor: {{ chart_funnel_colors|safe }},
                borderWidth: 0,
                borderRadius: 4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            indexAxis: 'y',
            plugins: {
                legend: { display: false }
            },
            scales: {
                x: { beginAtZero: true }
            }
        }
    });
</script>
{% endblock %}
