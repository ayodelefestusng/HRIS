<div class="row">
    <div class="col-md-4">
        <div class="admin-card p-3">
            <h5 class="text-white mb-1">{{ candidate.full_name }}</h5>
            <p class="text-primary small mb-3">{{ candidate.email }}</p>
            
            <div class="mb-3">
                <label class="text-slate-500 x-small uppercase d-block">Resume</label>
                <a href="{{ candidate.resume.url }}" class="btn btn-xs btn-outline-slate-600 text-white w-100">
                    <i class="bi bi-file-earmark-pdf"></i> View Documents
                </a>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="admin-card p-3">
            <h6 class="text-white fw-bold">Skill Match Analysis</h6>
            {% for skill in candidate.skill_profiles.all %}
            <div class="d-flex align-items-center mb-2">
                <div class="small text-slate-300 flex-grow-1">{{ skill.skill.name }}</div>
                <div class="progress bg-slate-800" style="width: 150px; height: 8px;">
                    <div class="progress-bar bg-info" style="width: {{ skill.level|multiply:20 }}%"></div>
                </div>
                <span class="ms-2 small text-info">Lvl {{ skill.level }}</span>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
