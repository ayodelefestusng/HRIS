{% include 'onboarding/partials/_task_list.html' with tasks=tasks plan=plan %}

<div id="progress-donut-container" hx-swap-oob="true">
    <div class="position-relative d-inline-block mb-4">
        <svg width="150" height="150">
            <circle cx="75" cy="75" r="65" stroke="#e9ecef" stroke-width="12" fill="none" />
            <circle cx="75" cy="75" r="65" stroke="#0d6efd" stroke-width="12" fill="none" 
                    stroke-dasharray="408" 
                    stroke-dashoffset="{{ 408|add:plan.progress|stringformat:'f' }}"
                    style="transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);" />
        </svg>
        <div class="position-absolute top-50 start-50 translate-middle">
            <h2 class="fw-bold mb-0 text-primary">{{ plan.progress|floatformat:0 }}%</h2>
        </div>
    </div>
</div>

<div class="progress-bar progress-bar-striped progress-bar-animated" 
     id="global-progress-bar"
     hx-swap-oob="true"
     role="progressbar" 
     style="width: {{ plan.progress }}%; transition: width 0.6s ease;">
</div>
